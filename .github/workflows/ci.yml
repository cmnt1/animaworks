name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-cpu-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-cpu-

      - name: Install PyTorch CPU-only (avoids multi-GB CUDA wheels on CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,all-tools]"

      - name: Lint
        run: |
          ruff check core/ cli/ server/
          ruff format --check core/ cli/ server/

      - name: Run unit tests
        run: |
          pytest tests/unit/ -x -q --timeout=30 -m "not live and not azure and not ollama" --cov=core --cov-report=term-missing --cov-report=xml --cov-fail-under=70

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    env:
      # Static, read-only model assets live in a stable cache shared across the
      # job (decoupled from the per-test ANIMAWORKS_DATA_DIR temp dirs).
      ANIMAWORKS_MODEL_CACHE_DIR: ${{ github.workspace }}/.cache/animaworks-models
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      HF_HUB_DISABLE_TELEMETRY: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-cpu-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-cpu-

      - name: Install PyTorch CPU-only (avoids multi-GB CUDA wheels on CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,all-tools]"

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/animaworks-models
            ${{ github.workspace }}/.cache/huggingface
          key: ${{ runner.os }}-hfmodels-${{ hashFiles('core/memory/rag/singleton.py', 'core/memory/retrieval/reranker.py') }}
          restore-keys: |
            ${{ runner.os }}-hfmodels-

      - name: Pre-download embedding models
        run: python scripts/ci/prefetch_models.py

      - name: Run e2e tests
        env:
          # Models are pre-fetched above; run offline so flaky HuggingFace HEAD
          # checks (HTTP 429) cannot stall tests past the pytest timeout.
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          pytest tests/e2e/ -x -q --timeout=60 -m "not live and not azure and not ollama"

  neo4j-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/animaworks
        options: >-
          --health-cmd "cypher-shell -u neo4j -p animaworks 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-neo4j-cpu-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-neo4j-cpu-
            ${{ runner.os }}-pip-cpu-

      - name: Install PyTorch CPU-only (avoids multi-GB CUDA wheels on CI)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,neo4j]"

      - name: Wait for Neo4j Bolt
        run: |
          python - <<'PY'
          import time
          from neo4j import GraphDatabase

          deadline = time.time() + 90
          last_error = None
          while time.time() < deadline:
              try:
                  with GraphDatabase.driver(
                      "bolt://localhost:7687",
                      auth=("neo4j", "animaworks"),
                  ) as driver:
                      driver.verify_connectivity()
                  raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          raise SystemExit(f"Neo4j service was not ready: {last_error!r}")
          PY

      - name: Run Neo4j integration tests
        env:
          ANIMAWORKS_TEST_NEO4J: "1"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: animaworks
          NEO4J_DATABASE: neo4j
        run: |
          pytest tests/integration/test_neo4j_backend_live.py -x -q --timeout=60 -m neo4j
