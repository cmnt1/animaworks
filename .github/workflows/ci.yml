name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,all-tools]"

      - name: Lint
        run: |
          ruff check core/ cli/ server/
          ruff format --check core/ cli/ server/

      - name: Run unit tests
        run: |
          pytest tests/unit/ -x -q --timeout=30 -m "not live and not azure and not ollama" --cov=core --cov-report=term-missing --cov-report=xml --cov-fail-under=70

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,all-tools]"

      - name: Run e2e tests
        run: |
          pytest tests/e2e/ -x -q --timeout=60 -m "not live and not azure and not ollama"

  neo4j-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit-tests

    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/animaworks
        options: >-
          --health-cmd "cypher-shell -u neo4j -p animaworks 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-neo4j-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-neo4j-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,neo4j]"

      - name: Wait for Neo4j Bolt
        run: |
          python - <<'PY'
          import time
          from neo4j import GraphDatabase

          deadline = time.time() + 90
          last_error = None
          while time.time() < deadline:
              try:
                  with GraphDatabase.driver(
                      "bolt://localhost:7687",
                      auth=("neo4j", "animaworks"),
                  ) as driver:
                      driver.verify_connectivity()
                  raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          raise SystemExit(f"Neo4j service was not ready: {last_error!r}")
          PY

      - name: Run Neo4j integration tests
        env:
          ANIMAWORKS_TEST_NEO4J: "1"
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: animaworks
          NEO4J_DATABASE: neo4j
        run: |
          pytest tests/integration/test_neo4j_backend_live.py -x -q --timeout=60 -m neo4j
